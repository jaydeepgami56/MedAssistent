services:
  # PostgreSQL 16 - Primary relational database
  postgres:
    image: postgres:16
    container_name: medassist-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: medassist
      POSTGRES_USER: medassist
      POSTGRES_PASSWORD: dev-password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medassist"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant - Vector database for similarity search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: medassist-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Orthanc - DICOM server for medical imaging
  orthanc:
    image: orthancteam/orthanc:latest
    container_name: medassist-orthanc
    ports:
      - "8042:8042"  # Web UI / REST API
      - "4242:4242"  # DICOM protocol
    volumes:
      - orthanc_data:/var/lib/orthanc/db
    environment:
      ORTHANC_NAME: "MedAssist DICOM Server"
      ORTHANC_USERNAME: orthanc
      ORTHANC_PASSWORD: orthanc
    restart: unless-stopped

  # Neo4j 5 - Knowledge graph database
  neo4j:
    image: neo4j:5
    container_name: medassist-neo4j
    ports:
      - "7474:7474"  # HTTP browser interface
      - "7687:7687"  # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/dev-password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PPT Worker — Ubuntu 24 container with Node.js, LibreOffice, pdftoppm
  # Executes AI-generated pptxgenjs code and produces .pptx + slide thumbnails.
  # Output files are written to the shared bind-mount ../ppt_outputs (host: openclaw/ppt_outputs)
  # so the FastAPI backend can serve downloads directly from the host path.
  ppt-worker:
    build:
      context: ./ppt-worker
    container_name: medassist-ppt-worker
    ports:
      - "8001:8001"          # accessible from host at http://localhost:8001
    volumes:
      - ../ppt_outputs:/ppt_outputs   # shared bind-mount: host openclaw/ppt_outputs ↔ container /ppt_outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
    driver: local
  qdrant_data:
    driver: local
  orthanc_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
